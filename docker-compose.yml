services:
  web:
    image: nginx:alpine
    volumes:
      - .:/usr/share/nginx/html:ro
    ports:
      - "8085:80"
    restart: always
  api:
    image: python:3.12-alpine
    command: python /app/app.py
    volumes:
      - ./api:/app:ro
      - ./v2:/data
    ports:
      - "8086:8000"
    env_file:
      - /srv/tzar-api.env   # UPLOAD_TOKEN вне web-корня и вне git
    restart: always
