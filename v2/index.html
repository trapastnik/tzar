<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ГМЗ Царское Село — просмотр скана</title>
<style>
  :root { --bg:#15171c; --panel:#1f232b; --line:#323844; --txt:#e7eaf0; --muted:#9aa3b2; --acc:#6ea8fe; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:13px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #c { position:fixed; inset:0; display:block; }
  #panel { position:fixed; top:12px; left:12px; width:248px; background:rgba(31,35,43,.92);
    border:1px solid var(--line); border-radius:12px; padding:14px; backdrop-filter:blur(8px); user-select:none;
    max-height:calc(100vh - 24px); overflow-y:auto; }
  #panel h1 { font-size:13px; margin:0 0 2px; font-weight:600; letter-spacing:.2px; }
  #panel .sub { color:var(--muted); font-size:11px; margin-bottom:12px; }
  label.f { display:block; color:var(--muted); font-size:11px; margin:10px 0 4px; }
  select { width:100%; background:#171a20; color:var(--txt); border:1px solid var(--line);
    border-radius:8px; padding:7px 8px; font-size:12px; }
  .row { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  button { flex:1 1 auto; background:#171a20; color:var(--txt); border:1px solid var(--line);
    border-radius:8px; padding:7px 6px; font-size:11.5px; cursor:pointer; white-space:nowrap; }
  button:hover { border-color:var(--acc); }
  button.on { background:var(--acc); color:#10131a; border-color:var(--acc); font-weight:600; }
  #stats { margin-top:12px; padding-top:11px; border-top:1px solid var(--line); color:var(--muted); font-size:11px; }
  #stats b { color:var(--txt); font-weight:600; }
  #stats div { display:flex; justify-content:space-between; margin:2px 0; }
  #up { margin-top:12px; padding-top:11px; border-top:1px solid var(--line); }
  #up input[type=text], #up input[type=password] { width:100%; background:#171a20; color:var(--txt);
    border:1px solid var(--line); border-radius:8px; padding:7px 8px; font-size:12px; margin-top:6px; }
  #up input[type=file] { width:100%; color:var(--muted); font-size:11px; margin-top:2px; }
  #upMsg { color:var(--muted); font-size:11px; margin-top:6px; min-height:14px; }
  #bDel { flex:0 1 auto; border-color:#7a4040; color:#d99; }
  .swatches { display:flex; gap:7px; margin-top:6px; }
  .sw { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:.15s; }
  .sw:hover { transform:scale(1.12); }
  .sw.on { border-color:#fff; }
  #hint { position:fixed; bottom:12px; left:12px; color:var(--muted); font-size:11px;
    background:rgba(31,35,43,.8); border:1px solid var(--line); border-radius:8px; padding:7px 10px; }
  #load { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:14px; background:var(--bg); z-index:5; transition:opacity .4s; }
  #load.hide { opacity:0; pointer-events:none; }
  #bar { width:220px; height:4px; background:#2a2f39; border-radius:3px; overflow:hidden; }
  #bar i { display:block; height:100%; width:0; background:var(--acc); transition:width .15s; }
  #load .t { color:var(--muted); font-size:12px; }
</style>
</head>
<body>

    <div class="sw" data-c="#ff6b6b" style="background:#ff6b6b"></div>
    <div class="sw" data-c="#e8e6df" style="background:#e8e6df"></div>
    <div class="sw" data-c="#c26bff" style="background:#c26bff"></div>
  </div>
  </div>
  <div class="row">
    <button id="bGrid" class="on">Сетка</button>

  <label class="f">Ориентация модели (сканы часто лежат на боку)</label>
  <div class="row">

  </div>

  <div id="stats">
    <div><span id="lblFaces">Полигоны</span><b id="sFaces">—</b></div>
    <div id="rVerts"><span>Вершины</span><b id="sVerts">—</b></div>
    <div id="rSH" style="display:none"><span>SH-гармоники</span><b id="sSH">—</b></div>
    <div id="rBps" style="display:none"><span>Байт на сплат</span><b id="sBps">—</b></div>
    <div><span>Габариты</span><b id="sSize">—</b></div>
    <div><span>Формат</span><b id="sFmt">—</b></div>

    <div id="rTs"><span>Загружено</span><b id="sTs">—</b></div>

  <div id="up">

</div>

<div id="hint">ЛКМ — вращать · ПКМ — панорама · колесо — зум</div>

<div id="load"><div class="t" id="lt">Загрузка three.js…</div><div id="bar"><i></i></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.module.js",
  "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeVertices, mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { MeshBVH } from 'three-mesh-bvh';
import * as GS3D from '@mkkellogg/gaussian-splats-3d';

// Базовые модели (лежат в git). Загруженные через сайт живут в models.json
// (его ведёт api; в git не входит) и добавляются к списку динамически.
const BASE_MODELS = [
  { name:'model3 · консоль', glb:'model3_console.glb' },
  { name:'model3 · ретопология (68k)', glb:'model3_retopo.glb' },
  { name:'test_Model_3', glb:'test_Model_3.glb' },
  { name:'test_Model_4', glb:'test_Model_4.glb' },
  { name:'test_Model_5', glb:'test_Model_5.glb' },
];
let MODELS = BASE_MODELS.slice();

const fileOf = m => (m && (m.glb || m.stl || m.ply || m.splat || m.ksplat || m.spz)) || '';
const splatFileOf = m => (m && (m.ply || m.splat || m.ksplat || m.spz)) || '';
async function refreshModels(selectGlb) {
  const prev = fileOf(MODELS[+($('sel').value || 0)]);
  let up = [];
  try {
    const r = await fetch('models.json?t=' + Date.now());
    if (r.ok) up = await r.json();
  } catch (e) { /* нет api/файла — остаются базовые */ }
  MODELS = BASE_MODELS.concat(up);   // меши и гауссианы — в одном списке
  const sel = $('sel');
  sel.innerHTML = '';
  MODELS.forEach((m, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = (fileOf(m).startsWith('uploads/') ? '↑ ' : '') + m.name
                  + (splatFileOf(m) ? ' · splat' : m.stl ? ' · STL' : '');
    sel.appendChild(o);
  });
  const want = selectGlb || prev;
  const idx = want ? MODELS.findIndex(m => fileOf(m) === want) : 0;
  sel.value = String(idx >= 0 ? idx : 0);
  const cs = $('cmpSel');
  const prevCmp = cs.value;
  cs.innerHTML = '';
  MODELS.forEach((m, i) => {
    if (splatFileOf(m)) return;   // сравнение — только меш с мешем
    const o = document.createElement('option');
    o.value = i;
    o.textContent = m.name;
    cs.appendChild(o);
  });
  if (prevCmp && +prevCmp < MODELS.length) cs.value = prevCmp;
  updateDelBtn();
}
function updateDelBtn() {
  const up = fileOf(MODELS[+$('sel').value]).startsWith('uploads/');
  $('bDel').style.display = up ? '' : 'none';
  $('rSave').style.display = up ? '' : 'none';
}
// сохранённая ориентация модели (кватернион из models.json)
function applyRot(e) {
  if (current) current.quaternion.fromArray((e && e.rot && e.rot.length === 4) ? e.rot : [0, 0, 0, 1]);
}
const FORMATS = [
  { id:'glb', label:'GLB · текстура' },
];

const $ = id => document.getElementById(id);
const fmt = n => n.toLocaleString('ru-RU');

const renderer = new THREE.WebGLRenderer({ canvas: $('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15171c);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 5000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
window.__v2 = { scene, camera, renderer, controls };   // debug-хук

scene.add(new THREE.HemisphereLight(0xffffff, 0x404048, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(3, 6, 4); scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.5); fill.position.set(-4, 2, -3); scene.add(fill);

let grid = null;
let current = null;        // текущая модель (THREE.Group)
let origMats = new Map();  // mesh -> исходный материал
let geoMat = new THREE.MeshStandardMaterial({ color: 0xb8bcc4, roughness: 0.85, metalness: 0, flatShading: true });
// wireframe с выбираемым цветом (unlit — линии всегда читаются)
const wireMat = new THREE.MeshBasicMaterial({ color: 0xd8a24a, wireframe: true, side: THREE.DoubleSide });
// нормали → RGB
const normMat = new THREE.MeshNormalMaterial({ side: THREE.DoubleSide });

/* Аналитические режимы: общий вершинник (мировая высота/нормаль + запечённые
   атрибуты aDetail/aCav) и фабрика фрагментников. clipping-чанки three.js —
   чтобы режимы дружили с плоскостью сечения. */
const ANALYTIC_VERT = `
  #include <clipping_planes_pars_vertex>
  attribute float aDetail; attribute float aCav; attribute float aDist;
  varying float vY; varying vec3 vN; varying float vDet; varying float vCav; varying float vDist;
  void main(){
    vec4 w = modelMatrix * vec4(position, 1.0);
    vY = w.y;
    vN = normalize(mat3(modelMatrix) * normal);
    vDet = aDetail; vCav = aCav; vDist = aDist;
    vec4 mvPosition = viewMatrix * w;
    gl_Position = projectionMatrix * mvPosition;
    #include <clipping_planes_vertex>
  }`;
function analyticMat(body, uniforms) {
  return new THREE.ShaderMaterial({
    side: THREE.DoubleSide, clipping: true, uniforms: uniforms || {},
    vertexShader: ANALYTIC_VERT,
    fragmentShader: `
      #include <clipping_planes_pars_fragment>
      varying float vY; varying vec3 vN; varying float vDet; varying float vCav; varying float vDist;
      ${Object.keys(uniforms || {}).map(u => 'uniform float ' + u + ';').join('\n')}
      vec3 hsv(float h){ vec3 p = abs(fract(vec3(h)+vec3(1.0,2.0/3.0,1.0/3.0))*6.0-3.0); return clamp(p-1.0,0.0,1.0); }
      void main(){
        #include <clipping_planes_fragment>
        vec3 n = normalize(vN);
        float shade = 0.55 + 0.45*abs(dot(n, normalize(vec3(0.4,0.8,0.5))));
        vec3 c;
        ${body}
        gl_FragColor = vec4(c, 1.0);
      }`
  });
}
// гипсометрия: градиент по мировой высоте (синий низ → красный верх)
const heightMat = analyticMat(
  `float t = clamp((vY-uMin)/max(uMax-uMin,1e-6),0.0,1.0); c = hsv(mix(0.62,0.0,t)) * shade;`,
  { uMin: { value: 0 }, uMax: { value: 1 } });
// уклон: полы/крыши зелёные, стены серо-синие, нависания красные
const slopeMat = analyticMat(`
  float t = acos(clamp(n.y, -1.0, 1.0)) / 3.14159;
  vec3 up = vec3(0.25,0.75,0.42), wall = vec3(0.35,0.49,0.55), down = vec3(0.85,0.30,0.28);
  c = (t < 0.5 ? mix(up, wall, smoothstep(0.12,0.45,t)) : mix(wall, down, smoothstep(0.55,0.85,t))) * shade;`);
// детальность скана: размер локальных треугольников (синее мелко → красное крупно)
const detailMat = analyticMat(
  `c = hsv(mix(0.62,0.0,clamp(vDet,0.0,1.0))) * shade;`);
// кривизна: выпуклое тёплое, плоское серое, вогнутое синее
const curvMat = analyticMat(`
  float t = clamp(vCav, 0.0, 1.0);
  vec3 warm = vec3(1.0,0.72,0.35), mid = vec3(0.62,0.63,0.66), cold = vec3(0.16,0.34,0.72);
  c = (t < 0.5 ? mix(warm, mid, t*2.0) : mix(mid, cold, (t-0.5)*2.0)) * shade;`);
// псевдо-AO: полости затемняются (cavity map)
const aoMat = analyticMat(
  `float ao = mix(1.12, 0.30, smoothstep(0.35, 0.85, vCav));
   c = vec3(0.80,0.79,0.76) * ao * shade;`);
// сравнение сканов: расстояние до эталона (зелёный 0 → жёлтый → красный ≥ uScale)
const cmpMat = analyticMat(`
  float t = clamp(vDist / max(uScale, 1e-6), 0.0, 1.0);
  vec3 g0 = vec3(0.20,0.70,0.35), y0 = vec3(0.95,0.85,0.25), r0 = vec3(0.90,0.20,0.15);
  c = (t < 0.5 ? mix(g0, y0, t*2.0) : mix(y0, r0, (t-0.5)*2.0)) * shade;`,
  { uScale: { value: 1 } });

// --- сечение (клиппинг-плоскость) ---
const clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
const CLIP_ARR = [clipPlane];
let clipAxis = null;
const lastSize = new THREE.Vector3(1, 1, 1);
renderer.localClippingEnabled = true;
function allMats() {
  const s = new Set([geoMat, wireMat, normMat, heightMat, slopeMat, detailMat, curvMat, aoMat]);
  origMats.forEach(m => s.add(m));
  return s;
}
function refreshClip() {
  const arr = clipAxis ? CLIP_ARR : null;
  allMats().forEach(m => { if (m.clippingPlanes !== arr) { m.clippingPlanes = arr; m.needsUpdate = true; } });
}
function updateClipPos() {
  if (!clipAxis) return;
  const half = lastSize[clipAxis] / 2 + 1e-3;
  const t = +$('cPos').value / 1000;
  clipPlane.constant = -half + 2 * half * t;   // слайдер вправо → модели больше
}
function setClipAxis(ax) {
  clipAxis = ax;
  ['cOff', 'cX', 'cY', 'cZ'].forEach(id => $(id).classList.remove('on'));
  $(ax === 'x' ? 'cX' : ax === 'y' ? 'cY' : ax === 'z' ? 'cZ' : 'cOff').classList.add('on');
  if (ax) {
    clipPlane.normal.set(ax === 'x' ? -1 : 0, ax === 'y' ? -1 : 0, ax === 'z' ? -1 : 0);
    updateClipPos();
  }
  refreshClip();
}

let mode = 'tex';          // tex | geo | height | slope | normal | detail | ao | curv
let wire = false, spin = false;
let initView = null;
const texLoader = new THREE.TextureLoader();
let gLoader = null, oLoader = null, sLoader = null;

function clearCurrent() {
  if (splatObj) { disposeSplat(); current = null; }
  curIsSplat = false;
  if (!current) return;
  scene.remove(current);
  current.traverse(o => { if (o.isMesh) { o.geometry.dispose(); } });
  origMats.clear();
  current = null;
}

const MODE_MAT = { height: heightMat, slope: slopeMat, normal: normMat, detail: detailMat, ao: aoMat, curv: curvMat, compare: cmpMat };
function applyMode() {
  if (!current || curIsSplat) return;
  // в аналитических режимах wireframe красится самим градиентом,
  // в Текстуре/Геометрии — отдельным материалом с выбранным цветом линий
  Object.values(MODE_MAT).forEach(m => { m.wireframe = wire; });
  geoMat.wireframe = false;
  current.traverse(o => {
    if (!o.isMesh) return;
    let m;
    if (MODE_MAT[mode]) m = MODE_MAT[mode];
    else if (wire) m = wireMat;
    else if (mode === 'geo') m = geoMat;
    else m = origMats.get(o) || geoMat;
    o.material = m;
  });
  refreshClip();
}

/* запечь на вершины: aDetail (лог-размер локальных треугольников — карта
   детальности скана) и aCav (вогнутость — питает Кривизну и псевдо-AO).
   Один проход по граням, кэш на geometry. non-indexed STL сначала
   свариваются (в бонус — сглаженные нормали). */
function bakeDetailCav() {
  if (!current) return;
  current.traverse(o => {
    if (!o.isMesh || o.geometry.userData.aBaked) return;
    let g = o.geometry;
    if (!g.index) {
      g = mergeVertices(g, 1e-4);
      g.computeVertexNormals();
      o.geometry.dispose();
      o.geometry = g;
    }
    const P = g.attributes.position.array, N = g.attributes.normal.array, I = g.index.array;
    const nv = g.attributes.position.count, nf = (I.length / 3) | 0;
    const aSum = new Float64Array(nv), aCnt = new Float32Array(nv);
    const cSum = new Float64Array(nv), cCnt = new Float32Array(nv);
    function edgeCav(i, j) {
      const dx = P[3*j] - P[3*i], dy = P[3*j+1] - P[3*i+1], dz = P[3*j+2] - P[3*i+2];
      const L = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      cSum[i] += (N[3*i]*dx + N[3*i+1]*dy + N[3*i+2]*dz) / L; cCnt[i]++;
      cSum[j] -= (N[3*j]*dx + N[3*j+1]*dy + N[3*j+2]*dz) / L; cCnt[j]++;
    }
    for (let f = 0; f < nf; f++) {
      const a = I[3*f], b = I[3*f+1], c = I[3*f+2];
      const ax=P[3*a], ay=P[3*a+1], az=P[3*a+2];
      const ux=P[3*b]-ax, uy=P[3*b+1]-ay, uz=P[3*b+2]-az;
      const vx=P[3*c]-ax, vy=P[3*c+1]-ay, vz=P[3*c+2]-az;
      const nx=uy*vz-uz*vy, ny=uz*vx-ux*vz, nz=ux*vy-uy*vx;
      const ar = Math.sqrt(nx*nx + ny*ny + nz*nz) * 0.5;
      aSum[a]+=ar; aSum[b]+=ar; aSum[c]+=ar; aCnt[a]++; aCnt[b]++; aCnt[c]++;
      edgeCav(a, b); edgeCav(b, c); edgeCav(c, a);
    }
    // нормировки: детальность — лог-отношение к медиане; вогнутость — к 90-му перцентилю
    const det = new Float32Array(nv), cav = new Float32Array(nv);
    const step = Math.max(1, (nv / 50000) | 0), sA = [], sC = [];
    for (let i = 0; i < nv; i += step) {
      if (aCnt[i]) sA.push(aSum[i] / aCnt[i]);
      if (cCnt[i]) sC.push(Math.abs(cSum[i] / cCnt[i]));
    }
    sA.sort((x, y) => x - y); sC.sort((x, y) => x - y);
    const medA = sA[sA.length >> 1] || 1;
    const scC = sC[(sC.length * 0.9) | 0] || 1e-6;
    for (let i = 0; i < nv; i++) {
      const A = aCnt[i] ? aSum[i] / aCnt[i] : medA;
      det[i] = Math.min(1, Math.max(0, 0.5 + Math.log2(A / medA) / 8));
      const C = cCnt[i] ? cSum[i] / cCnt[i] : 0;
      cav[i] = Math.min(1, Math.max(0, 0.5 + 0.5 * C / scC));
    }
    g.setAttribute('aDetail', new THREE.BufferAttribute(det, 1));
    g.setAttribute('aCav', new THREE.BufferAttribute(cav, 1));
    g.userData.aBaked = true;
  });
}

function frameModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);                 // центрируем в начале координат
  const maxDim = Math.max(size.x, size.y, size.z) || 1;

  if (grid) scene.remove(grid);
  grid = new THREE.GridHelper(maxDim * 2.4, 24, 0x3a4252, 0x262b34);
  grid.position.y = -size.y / 2;
  heightMat.uniforms.uMin.value = -size.y / 2;   // модель центрирована в origin
  heightMat.uniforms.uMax.value = size.y / 2;
  lastSize.copy(size);
  updateClipPos();
  grid.visible = $('bGrid').classList.contains('on');
  scene.add(grid);

  camera.near = maxDim / 200; camera.far = maxDim * 200; camera.updateProjectionMatrix();
  const d = maxDim * 1.7;
  camera.position.set(d * 0.8, d * 0.55, d);
  controls.target.set(0, 0, 0);
  controls.update();
  initView = { pos: camera.position.clone(), tgt: controls.target.clone() };

  // статистика
  let faces = 0, verts = 0;
  model.traverse(o => {
    if (o.isMesh) {
      const g = o.geometry;
      verts += g.attributes.position.count;
      faces += (g.index ? g.index.count : g.attributes.position.count) / 3;
    }
  });
  $('sFaces').textContent = fmt(faces);
  $('sVerts').textContent = fmt(verts);
  $('sSize').textContent = `${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;
}

/* ===== техпаспорт: мгновенная статистика по заголовку файла (Range-пробник) ===== */
let probeSeq = 0;
const FMT_LABEL = { glb: 'GLB (меш)', stl: 'STL (меш)', ply: 'PLY · 3DGS',
                    spz: 'SPZ (сжатый 3DGS)', splat: '.splat', ksplat: 'KSplat' };
function extOf(f) { const m = f.toLowerCase().match(/\.(glb|stl|ply|splat|ksplat|spz)$/); return m ? m[1] : ''; }
const fmtNum = n => Math.round(n).toLocaleString('ru-RU');

// первые байты файла; сервер без Range (локалка) отдаёт 200 — читаем поток до лимита и рвём
async function rangeFetch(url, start, end) {
  const r = await fetch(url, { headers: { Range: 'bytes=' + start + '-' + end } });
  if (r.status === 206) return new Uint8Array(await r.arrayBuffer());
  const want = end + 1;
  const reader = r.body.getReader();
  const chunks = [];
  let got = 0;
  while (got < want) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value); got += value.length;
  }
  reader.cancel().catch(() => {});
  const all = new Uint8Array(got);
  let o = 0;
  for (const c of chunks) { all.set(c, o); o += c.length; }
  return all.subarray(start, Math.min(want, got));
}

async function probeStats(e) {
  const seq = ++probeSeq;
  const f = fileOf(e);
  const ext = extOf(f);
  const put = (id, v) => { if (seq === probeSeq) $(id).textContent = v; };
  ['sFaces', 'sVerts', 'sSH', 'sBps', 'sSize', 'sBytes'].forEach(id => put(id, '…'));
  put('sFmt', FMT_LABEL[ext] || '—');
  $('rTs').style.display = e.ts ? '' : 'none';
  put('sTs', e.ts || '—');
  try {
    let size = e.size || 0;
    if (!size) {
      const h = await fetch(f, { method: 'HEAD' });
      size = +h.headers.get('content-length') || 0;
    }
    put('sBytes', size ? (size / 1e6).toFixed(1) + ' МБ' : '—');
    if (ext === 'stl' && size > 84) {
      put('sFaces', fmtNum((size - 84) / 50));
    } else if (ext === 'splat' && size) {
      put('sFaces', fmtNum(size / 32));
      put('sSH', '0 (нет)');
      put('sBps', '32');
    } else if (ext === 'glb') {
      const head = await rangeFetch(f, 0, 19);
      const dv = new DataView(head.buffer, head.byteOffset, head.byteLength);
      if (dv.getUint32(0, true) === 0x46546C67) {          // 'glTF'
        const jsonLen = dv.getUint32(12, true);            // длина JSON-чанка (тип — по смещению 16)
        const jb = await rangeFetch(f, 20, 19 + jsonLen);
        const j = JSON.parse(new TextDecoder().decode(jb));
        let tris = 0, verts = 0;
        for (const m of j.meshes || []) for (const p of m.primitives || []) {
          if (p.indices != null) tris += (j.accessors[p.indices].count || 0) / 3;
          else if (p.attributes && p.attributes.POSITION != null) tris += (j.accessors[p.attributes.POSITION].count || 0) / 3;
          if (p.attributes && p.attributes.POSITION != null) verts += j.accessors[p.attributes.POSITION].count || 0;
        }
        put('sFaces', fmtNum(tris));
        put('sVerts', fmtNum(verts));
      }
    } else if (ext === 'ply') {
      const head = await rangeFetch(f, 0, 4095);
      const txt = new TextDecoder('ascii').decode(head);
      const vm = txt.match(/element vertex (\d+)/);
      const rest = (txt.match(/property float f_rest_/g) || []).length;
      const deg = Math.round(Math.sqrt(rest / 3 + 1) - 1);
      if (vm) {
        put('sFaces', fmtNum(+vm[1]));
        put('sSH', rest ? deg + ' (есть блики)' : '0 (нет)');
        if (size) put('sBps', (size / +vm[1]).toFixed(1));
      }
    } else if (ext === 'spz') {
      const gz = await rangeFetch(f, 0, 2047);
      const ds = new Response(new Blob([gz]).stream().pipeThrough(new DecompressionStream('gzip')));
      const reader = ds.body.getReader();
      const { value } = await reader.read();               // первый чанк ≥ 16 байт
      reader.cancel().catch(() => {});
      if (value && value.length >= 16) {
        const hv = new DataView(value.buffer, value.byteOffset, 16);
        if (hv.getUint32(0, true) === 0x5053474E) {
          const n = hv.getUint32(8, true);
          put('sFaces', fmtNum(n));
          put('sSH', value[12] + (value[12] === 3 ? ' (полные)' : ''));
          if (size) put('sBps', (size / n).toFixed(1));
        }
      }
    }
  } catch (err) { console.warn('probe', err); }
}
const _sc = new THREE.Vector3();
function frameSplat(dropIn) {
  // bbox по подвыборке центров сплатов, 2–98 перцентили — гауссианы всегда
  // имеют дальние выбросы («небо»), которые раздувают честный bbox в сотни метров
  const box = new THREE.Box3();
  try {
    const sm = dropIn.viewer ? dropIn.viewer.splatMesh : dropIn.splatMesh;
    const n = sm.getSplatCount();
    const step = Math.max(1, (n / 20000) | 0);
    const xs = [], ys = [], zs = [];
    for (let i = 0; i < n; i += step) {
      sm.getSplatCenter(i, _sc, false);
      _sc.applyQuaternion(current.quaternion);   // бокс в мировых осях (с учётом сохранённого поворота)
      xs.push(_sc.x); ys.push(_sc.y); zs.push(_sc.z);
    }
    const pct = (a, p) => { a.sort((u, v) => u - v); return a[Math.floor(a.length * p)]; };
    box.min.set(pct(xs, 0.02), pct(ys, 0.02), pct(zs, 0.02));
    box.max.set(pct(xs, 0.98), pct(ys, 0.98), pct(zs, 0.98));
  } catch (e) { console.warn('frameSplat fallback', e); }
  if (box.isEmpty()) box.setFromCenterAndSize(new THREE.Vector3(), new THREE.Vector3(10, 10, 10));
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  current.position.copy(center).multiplyScalar(-1);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  if (grid) scene.remove(grid);
  grid = new THREE.GridHelper(maxDim * 2.4, 24, 0x3a4252, 0x262b34);
  grid.position.y = -size.y / 2;
  grid.visible = $('bGrid').classList.contains('on');
  scene.add(grid);
  camera.near = maxDim / 200; camera.far = maxDim * 200; camera.updateProjectionMatrix();
  const d = maxDim * 1.7;
  camera.position.set(d * 0.8, d * 0.55, d);
  controls.target.set(0, 0, 0);
  controls.update();
  initView = { pos: camera.position.clone(), tgt: controls.target.clone() };
  lastSize.copy(size);
  $('sSize').textContent = `${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;
}
async function loadSplat(e) {
  const f = fileOf(e);
  const myGen = loadGen;
  showLoad(`Загрузка ${f}…`, f);
  clearCurrent();
  try {
    let url = f + '?t=' + Date.now();
    let fmt = GS3D.SceneFormat.Ply;
    if (/\.spz$/i.test(f)) fmt = GS3D.SceneFormat.Spz;
    else if (/\.ksplat$/i.test(f)) fmt = GS3D.SceneFormat.KSplat;
    else if (/\.splat$/i.test(f)) fmt = GS3D.SceneFormat.Splat;
    const dropIn = new GS3D.DropInViewer({
      sharedMemoryForWorkers: false,
      gpuAcceleratedSort: false,
      dynamicScene: true,
    });
    await dropIn.addSplatScene(url, {
      format: fmt, showLoadingUI: false, progressiveLoad: false,
      onProgress: p => { if (myGen === loadGen) $('lt').textContent = `Загрузка ${f}… ` + Math.round(p) + '%'; },
    });
    if (myGen !== loadGen) { try { dropIn.dispose(); } catch (er) {} return; }   // модель уже сменили
    splatObj = new THREE.Group();
    splatObj.add(dropIn);
    splatObj.userData.dropIn = dropIn;
    current = splatObj;
    curIsSplat = true;
    applyRot(e);
    scene.add(splatObj);
    frameSplat(dropIn);
    let cnt = 0;
    try { cnt = (dropIn.viewer ? dropIn.viewer.splatMesh : dropIn.splatMesh).getSplatCount(); } catch (er) {}
    if (cnt) {
      $('sFaces').textContent = cnt.toLocaleString('ru-RU');
      if (e.size) $('sBps').textContent = (e.size / cnt).toFixed(1);
    }
    $('load').classList.add('hide');
  } catch (err) {
    console.error(err);
    $('lt').textContent = `Не удалось загрузить ${f}: ` + (err.message || err);
  }
}

/* SPZ v3 (Scaniverse 2025+) → v2 в браузере: GS3D читает только v1/v2.
   Отличие v3 — упаковка ротаций (smallest-three 4Б → int8-xyz 3Б). */
async function spzV3toV2(arrayBuffer) {
  const gunzip = new Response(new Response(arrayBuffer).body.pipeThrough(new DecompressionStream('gzip')));
  const raw = new Uint8Array(await gunzip.arrayBuffer());
  const dv = new DataView(raw.buffer);
  if (dv.getUint32(0, true) !== 0x5053474E) throw new Error('не SPZ (нет магии NGSP)');
  if (dv.getUint32(4, true) !== 3) return null;
  const n = dv.getUint32(8, true);
  const sh = raw[12], flags = raw[14];
  const shdim = (sh + 1) * (sh + 1) - 1;
  const oRot = 16 + n * 16, oSh = oRot + n * 4, oEnd = oSh + n * shdim * 3;
  if (raw.length < oEnd) throw new Error('SPZ обрезан');
  const rot4 = new Uint32Array(raw.buffer, oRot, n);
  const rot3 = new Uint8Array(n * 3);
  const SQ = Math.SQRT1_2, q = [0, 0, 0, 0];
  for (let i = 0; i < n; i++) {
    const c = rot4[i], iL = c >>> 30;
    let s2 = 0, k = 0;
    q[0] = q[1] = q[2] = q[3] = 0;
    for (let j = 0; j < 4; j++) {
      if (j === iL) continue;
      const g = (c >>> (20 - 10 * k)) & 1023;
      let v = (g & 511) / 511 * SQ;
      if (g & 512) v = -v;
      q[j] = v; s2 += v * v; k++;
    }
    q[iL] = Math.sqrt(Math.max(0, 1 - s2));
    const s = q[3] < 0 ? -127.5 : 127.5;
    rot3[i * 3] = Math.max(0, Math.min(255, Math.round(q[0] * s + 127.5)));
    rot3[i * 3 + 1] = Math.max(0, Math.min(255, Math.round(q[1] * s + 127.5)));
    rot3[i * 3 + 2] = Math.max(0, Math.min(255, Math.round(q[2] * s + 127.5)));
  }
  const out = new Uint8Array(oEnd - n);
  out.set(raw.subarray(0, 16), 0);
  new DataView(out.buffer).setUint32(4, 2, true);
  out[14] = flags & 1;
  out.set(raw.subarray(16, oRot), 16);
  out.set(rot3, oRot);
  out.set(raw.subarray(oSh, oEnd), oRot + n * 3);
  const gz = new Response(new Response(out).body.pipeThrough(new CompressionStream('gzip')));
  return new Blob([await gz.arrayBuffer()]);
}
async function prepSpz(f) {
  if (!/\.spz$/i.test(f.name || '')) return f;
  upMsg('Проверка SPZ… (v3 конвертируется, до минуты)');
  const conv = await spzV3toV2(await f.arrayBuffer());
  if (conv) upMsg('SPZ v3 → v2 (совместимость вьюера)');
  return conv || f;
}
$('bUp').onclick = async () => {
  const f = $('upFile').files[0];
  if (!f) { upMsg('Выберите файл модели или сцены'); return; }
  const tok = $('upTok').value.trim();
  if (!tok) { upMsg('Введите ключ загрузки'); return; }
  localStorage.setItem('tzarUpTok', tok);
  const name = $('upName').value.trim() || f.name.replace(/\.(glb|stl|ply|splat|ksplat|spz)$/i, '');
  const em = f.name.toLowerCase().match(/\.(glb|stl|ply|splat|ksplat|spz)$/);
  const ext = em ? em[1] : 'glb';
  let body = f;
  if (ext === 'spz') {
    try { body = await prepSpz(f); }
    catch (e) { upMsg('Ошибка SPZ: ' + (e.message || e)); return; }
  }
  const xhr = new XMLHttpRequest();
  xhr.open('PUT', 'api/upload?name=' + encodeURIComponent(name) + '&ext=' + ext);
  xhr.setRequestHeader('X-Upload-Token', tok);
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) upMsg('Загрузка… ' + Math.round(e.loaded / e.total * 100) + '%');
  };
  xhr.onload = async () => {
    let r = {}; try { r = JSON.parse(xhr.responseText); } catch (e) {}
    if (xhr.status === 200 && r.ok) {
      upMsg('Готово: ' + r.model.name);
      $('upFile').value = ''; $('upName').value = '';
      await refreshModels(fileOf(r.model));
      loadModel();
    } else upMsg('Ошибка: ' + (r.error || ('HTTP ' + xhr.status)));
  };
  xhr.onerror = () => upMsg('Сбой сети при загрузке');
  xhr.onloadend = () => { $('bUp').disabled = false; };
  $('bUp').disabled = true;
  xhr.send(body);
};

  const r = await fetch('api/upload?file=' + encodeURIComponent(file), {
    method: 'DELETE', headers: { 'X-Upload-Token': tok } });
  if (r.ok) {
    upMsg('Удалено');
    await refreshModels();
    loadModel();
  } else {
    let j = {}; try { j = await r.json(); } catch (e) {}
    upMsg('Ошибка удаления: ' + (j.error || r.status));
  }
};

const MODE_BTN = { tex: 'bTex', geo: 'bGeo', height: 'bHeight', slope: 'bSlope', normal: 'bNorm',
                   detail: 'bDetail', ao: 'bAO', curv: 'bCurv' };
const NEEDS_BAKE = { detail: 1, ao: 1, curv: 1 };
function bakedAll() {
  let ok = true;
  current.traverse(o => { if (o.isMesh && !o.geometry.userData.aBaked) ok = false; });
  return ok;
}
function toggleMode(m) {
  mode = m;
  for (const k in MODE_BTN) $(MODE_BTN[k]).classList.toggle('on', k === m);
  if (NEEDS_BAKE[m] && current && !bakedAll()) {
    $('lt').textContent = 'Расчёт геометрии…';
    $('load').classList.remove('hide');
    setTimeout(() => { bakeDetailCav(); $('load').classList.add('hide'); applyMode(); }, 30);
  } else applyMode();
}
$('bTex').onclick = () => toggleMode('tex');
$('bGeo').onclick = () => toggleMode('geo');
$('bHeight').onclick = () => toggleMode('height');
$('bSlope').onclick = () => toggleMode('slope');
$('bNorm').onclick = () => toggleMode('normal');
$('bDetail').onclick = () => toggleMode('detail');
$('bAO').onclick = () => toggleMode('ao');
$('bCurv').onclick = () => toggleMode('curv');
$('cOff').onclick = () => setClipAxis(null);
$('cX').onclick = () => setClipAxis('x');
$('cY').onclick = () => setClipAxis('y');
$('cZ').onclick = () => setClipAxis('z');
$('cPos').oninput = updateClipPos;
document.querySelectorAll('#wireSw .sw').forEach(s => s.onclick = () => {
  document.querySelectorAll('#wireSw .sw').forEach(x => x.classList.remove('on'));
  s.classList.add('on');
  wireMat.color.set(s.dataset.c);
});
$('bWire').onclick = () => { wire = !wire; $('bWire').classList.toggle('on', wire); applyMode(); };
$('bGrid').onclick = () => { const b = $('bGrid'); b.classList.toggle('on'); if (grid) grid.visible = b.classList.contains('on'); };
$('bSpin').onclick = () => { spin = !spin; $('bSpin').classList.toggle('on', spin); };
$('bReset').onclick = () => { if (initView) { camera.position.copy(initView.pos); controls.target.copy(initView.tgt); controls.update(); } };

// --- ориентация: повороты на 90° вокруг мировых осей + сохранение на сервере ---
function rotWorld(x, y, z) {
  if (!current) return;
  const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(x, y, z), Math.PI / 2);
  current.quaternion.premultiply(q);
  if (curIsSplat) frameSplat(splatObj.userData.dropIn);
  else frameModel(current);
}
$('rX').onclick = () => rotWorld(1, 0, 0);
$('rY').onclick = () => rotWorld(0, 1, 0);
$('rZ').onclick = () => rotWorld(0, 0, 1);
$('rReset').onclick = () => {
  applyRot(MODELS[+sel.value]);
  if (!current) return;
  if (curIsSplat) frameSplat(splatObj.userData.dropIn); else frameModel(current);
};
$('rSave').onclick = async () => {
  const m = MODELS[+sel.value];
  const file = fileOf(m);
  if (!current || !file.startsWith('uploads/')) return;
  const tok = $('upTok').value.trim() || localStorage.getItem('tzarUpTok') || '';
  if (!tok) { upMsg('Введите ключ загрузки'); return; }
  const rot = current.quaternion.toArray().map(v => +v.toFixed(6));
  const r = await fetch('api/meta?file=' + encodeURIComponent(file) + '&rot=' + rot.join(','), {
    method: 'POST', headers: { 'X-Upload-Token': tok } });
  if (r.ok) { m.rot = rot; upMsg('Ориентация сохранена — теперь так у всех'); }
  else { let j = {}; try { j = await r.json(); } catch (e) {} upMsg('Ошибка: ' + (j.error || r.status)); }
};

/* --- сравнение сканов: для каждой вершины текущей модели — расстояние до
   поверхности эталона (BVH-поиск ближайшей точки, three-mesh-bvh). Обе
   геометрии в исходных скан-координатах, так что сравнение честное, если
   сканы сняты в одном фрейме. --- */
const _cmpV = new THREE.Vector3();
const tick = () => new Promise(r => setTimeout(r, 0));
let cmpBusy = false;
function seqIndex(n) { const a = new Uint32Array(n); for (let i = 0; i < n; i++) a[i] = i; return a; }
function loadRefGeometry(e) {
  return new Promise((resolve, reject) => {
    const url = (e.glb || e.stl) + '?t=' + Date.now();
    const prog = p => { if (p.lengthComputable) $('cmpInfo').textContent = 'Загрузка эталона… ' + Math.round(p.loaded / p.total * 100) + '%'; };
    const done = gs => { try { resolve(gs.length > 1 ? mergeGeometries(gs) : gs[0]); } catch (err) { reject(err); } };
    if (e.glb) {
      if (!gLoader) gLoader = new GLTFLoader();
      gLoader.load(url, gltf => {
        const gs = [];
        gltf.scene.traverse(o => {
          if (!o.isMesh) return;
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', o.geometry.attributes.position);
          g.setIndex(o.geometry.index || new THREE.BufferAttribute(seqIndex(o.geometry.attributes.position.count), 1));
          gs.push(g);
        });
        gs.length ? done(gs) : reject(new Error('в эталоне нет мешей'));
      }, prog, reject);
    } else if (e.stl) {
      if (!sLoader) sLoader = new STLLoader();
      sLoader.load(url, geo => {
        geo.setIndex(new THREE.BufferAttribute(seqIndex(geo.attributes.position.count), 1));
        done([geo]);
      }, prog, reject);
    } else reject(new Error('у эталона нет glb/stl'));
  });
}
$('cmpRun').onclick = async () => {
  if (cmpBusy || !current) return;
  const refI = +$('cmpSel').value, curI = +sel.value;
  if (refI === curI) { $('cmpInfo').textContent = 'Эталон совпадает с текущей моделью — выберите другую.'; return; }
  cmpBusy = true; $('cmpRun').disabled = true;
  try {
    $('cmpInfo').textContent = 'Загрузка эталона…';
    const refGeo = await loadRefGeometry(MODELS[refI]);
    $('cmpInfo').textContent = 'Построение BVH…';
    await tick();
    const bvh = new MeshBVH(refGeo);
    const meshes = [];
    current.traverse(o => { if (o.isMesh) meshes.push(o); });
    let total = 0, done = 0;
    meshes.forEach(m => { total += m.geometry.attributes.position.count; });
    const target = {}, sample = [];
    for (const m of meshes) {
      const pos = m.geometry.attributes.position;
      const arr = new Float32Array(pos.count);
      for (let i = 0; i < pos.count; i += 20000) {
        const end = Math.min(i + 20000, pos.count);
        for (let k = i; k < end; k++) {
          _cmpV.fromBufferAttribute(pos, k);
          bvh.closestPointToPoint(_cmpV, target);
          arr[k] = target.distance;
        }
        done += end - i;
        $('cmpInfo').textContent = 'Сравнение… ' + Math.round(done / total * 100) + '%';
        await tick();
      }
      const st = Math.max(1, (pos.count / 30000) | 0);
      for (let k = 0; k < pos.count; k += st) sample.push(arr[k]);
      m.geometry.setAttribute('aDist', new THREE.BufferAttribute(arr, 1));
    }
    sample.sort((a, b) => a - b);
    const med = sample[sample.length >> 1] || 0;
    const p95 = sample[(sample.length * 0.95) | 0] || 1;
    cmpMat.uniforms.uScale.value = Math.max(p95, 1e-6);
    refGeo.dispose();
    mode = 'compare';
    for (const k in MODE_BTN) $(MODE_BTN[k]).classList.remove('on');
    applyMode();
    $('cmpOffB').style.display = '';
    $('cmpInfo').textContent = 'vs «' + MODELS[refI].name + '»: медиана ' + med.toFixed(1) +
      ' мм · 95% в пределах ' + p95.toFixed(1) + ' мм (красное ≥)';
  } catch (err) {
    console.error(err);
    $('cmpInfo').textContent = 'Ошибка: ' + (err.message || err);
  }
  cmpBusy = false; $('cmpRun').disabled = false;
};
$('cmpOffB').onclick = () => {
  $('cmpOffB').style.display = 'none';
  $('cmpInfo').textContent = '';
  toggleMode('geo');
};

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
renderer.setSize(innerWidth, innerHeight);

(function animate() {
  requestAnimationFrame(animate);
  if (spin && current) current.rotation.y += 0.0032;
  controls.update();
  renderer.render(scene, camera);
})();

// щит для полей ввода: GS3D вешает хоткеи (WASD/E/C/I/U/...) на window и глотает
// буквы при наборе (e.code не зависит от раскладки — страдает и кириллица).
// capture-фаза + регистрация раньше создания GS3D-вьюера → наш обработчик первый.
['keydown', 'keyup'].forEach(t => window.addEventListener(t, e => {
  const tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') e.stopImmediatePropagation();
}, true));

$('upTok').value = localStorage.getItem('tzarUpTok') || '';
refreshModels().then(loadModel);
</script>
